name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show versions
        run: |
          flutter --version
          xcodebuild -version

      - name: Build unsigned IPA
        run: bash scripts/build_unsigned_ipa.sh

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SLS_Assistant_IPA
          path: build/ios/ipa/SLS_Assistant.ipa
          if-no-files-found: error
