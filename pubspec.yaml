name: sls_assistant_pro
description: Smart companion dashboard, tasks, map, and scanner for SLS drivers.
publish_to: 'none'
version: 1.9.15+8

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.10.0
  flutter_secure_storage: ^10.3.1
  mobile_scanner: ^6.0.2
  url_launcher: ^6.3.1
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
